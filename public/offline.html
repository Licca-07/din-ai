<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>通信できない | Din AI</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 24px;
      }

      main {
        width: min(100%, 28rem);
        text-align: center;
      }

      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1rem;
        border-radius: 9999px;
        background: #10b981;
        color: #09090b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        font-weight: 600;
      }

      p {
        margin: 0 0 1.5rem;
        color: #a1a1aa;
        line-height: 1.6;
        font-size: 0.95rem;
      }

      button {
        border: 0;
        border-radius: 1rem;
        background: #10b981;
        color: #09090b;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.85rem 1.25rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">D</div>
      <h1>通信できない</h1>
      <p>ネットワークに接続できません。接続を確認してから、もう一度お試しください。</p>
      <button type="button" onclick="window.location.reload()">再試行</button>
    </main>
  </body>
</html>
